name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build
        run: dotnet build Vespa.NET.slnx -c Release

      - name: Test (unit)
        run: dotnet test tests/Vespa.NET.Tests/Vespa.NET.Tests.csproj -c Release --no-build --verbosity normal

  publish:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Pack
        run: |
          dotnet pack src/Vespa.NET.Models/Vespa.NET.Models.csproj -c Release -o ./artifacts
          dotnet pack src/Vespa.NET/Vespa.NET.csproj -c Release -o ./artifacts
          dotnet pack src/Vespa.NET.Testcontainers/Vespa.NET.Testcontainers.csproj -c Release -o ./artifacts

      - name: NuGet login (trusted publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
